<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人书房 · 威士忌角落 3.62m×1.82m</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0d0b09; overflow: hidden; font-family: 'PingFang SC',sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(15,12,8,0.92); color: #b8a88a; padding: 12px 24px;
    border: 1px solid #4a3a28; border-radius: 30px; font-size: 13px;
    letter-spacing: 2px; pointer-events: none; z-index: 10;
  }
  #info {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    color: #9a8a7a; font-size: 12px; letter-spacing: 3px;
    opacity: 0.6; pointer-events: none; z-index: 10;
  }
  #legend {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    color: #7a6a5a; font-size: 10px; line-height: 2.2;
    pointer-events: none; z-index: 10;
  }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
</style>
</head>
<body>
<div id="info">🥃 私人书房 · 威士忌角落</div>
<div id="legend">
  <div><span class="dot" style="background:#c8a96e"></span>暖光照明</div>
  <div><span class="dot" style="background:#3d2b1f"></span>胡桃木</div>
  <div><span class="dot" style="background:#5a4a3a"></span>微水泥墙面</div>
  <div><span class="dot" style="background:#2a3a2a"></span>窗外绿意</div>
  <div><span class="dot" style="background:#3a2a1a"></span>皮质家具</div>
</div>
<div id="ui">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移 &nbsp;|&nbsp; 3.62m × 1.82m</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ 场景 ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0806, 0.0006);
scene.background = new THREE.Color(0x0a0806);

const W = 3.62, D = 1.82, H = 2.60;

// ============ 相机 ============
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 20);
camera.position.set(5, 2.2, 4);
camera.lookAt(W/2, H/2, D/2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ============ 控制器 ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(W/2, 1.1, D/2);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 1.5; controls.maxDistance = 10;
controls.maxPolarAngle = Math.PI * 0.58;
controls.update();

// ============ 材质预设 ============
const matWalnut = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.4, metalness: 0.05 });
const matDarkWood = new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.45, metalness: 0.08 });
const matFloor = new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.5, metalness: 0.05 });
const matWall = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.75, metalness: 0 });
const matCeiling = new THREE.MeshStandardMaterial({ color: 0x1c130a, roughness: 0.85, metalness: 0 });
const matLeather = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.5, metalness: 0.05 });
const matBrass = new THREE.MeshStandardMaterial({ color: 0xa08050, roughness: 0.25, metalness: 0.85 });
const matDeskTop = new THREE.MeshStandardMaterial({ color: 0x332218, roughness: 0.3, metalness: 0.1 });
const matGlass = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0, metalness: 0, transparent: true, opacity: 0.35, clearcoat: 0.4 });
const matMetal = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.3, metalness: 0.7 });

// ============ 地板 ============
const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, D), matFloor);
floor.rotation.x = -Math.PI / 2; floor.position.set(W/2, 0, D/2);
floor.receiveShadow = true;
scene.add(floor);

// 地毯 — 书桌区
const rug = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.0), new THREE.MeshStandardMaterial({ color: 0x3a2820, roughness: 1 }));
rug.rotation.x = -Math.PI / 2; rug.position.set(2.5, 0.003, D/2);
rug.receiveShadow = true;
scene.add(rug);

// ============ 天花板 ============
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(W, D), matCeiling);
ceiling.rotation.x = Math.PI / 2; ceiling.position.set(W/2, H, D/2);
scene.add(ceiling);

// 木梁
for (let i = 0; i < 5; i++) {
  const beam = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, D), matDarkWood);
  beam.position.set(0.3 + i * 0.78, H - 0.03, D/2);
  beam.castShadow = true;
  scene.add(beam);
}

// ============ 墙面（微水泥质感）============
function addWall(x, y, z, w, h, ry) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), matWall);
  wall.position.set(x, y, z);
  wall.rotation.y = ry;
  wall.receiveShadow = true;
  return wall;
}

// 后长墙 (3.62m, Z=D)
addWall(W/2, H/2, D, W, H, 0);

// ============ 左短墙 + 推拉门 (1.2m) ============
// 门框
const doorW = 1.2, doorH = 2.1, doorY = 1.05;
// 门上方的墙
const wallAboveDoor = new THREE.Mesh(new THREE.PlaneGeometry(doorW, H - doorH), matWall);
wallAboveDoor.rotation.y = Math.PI / 2;
wallAboveDoor.position.set(0.01, doorH + (H - doorH)/2, D/2 - doorW/2 + 0.6);
wallAboveDoor.receiveShadow = true;
scene.add(wallAboveDoor);

// 门右侧墙
const wallRightDoor = new THREE.Mesh(new THREE.PlaneGeometry(D - doorW, H), matWall);
wallRightDoor.rotation.y = Math.PI / 2;
wallRightDoor.position.set(0.01, H/2, D - (D - doorW)/2 + 0.05);
wallRightDoor.receiveShadow = true;
scene.add(wallRightDoor);

// 推拉门（玻璃+木框）
const doorGroup = new THREE.Group();
// 木框
const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(0.04, doorH, 0.04), matWalnut);
doorFrame.position.set(0, 0, 0);
doorGroup.add(doorFrame);

// 玻璃门扇
const doorGlass = new THREE.Mesh(new THREE.PlaneGeometry(doorW - 0.1, doorH - 0.15), new THREE.MeshPhysicalMaterial({ color: 0x8899aa, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.3, clearcoat: 0.3 }));
doorGlass.position.set(0, 0, 0.01);
doorGroup.add(doorGlass);

// 木横档
for (let r = 0; r < 3; r++) {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(doorW, 0.03, 0.04), matWalnut);
  rail.position.set(0, -doorH/3 + r * doorH/3, 0);
  doorGroup.add(rail);
}

// 黄铜拉手
const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.25, 8), matBrass);
handle.position.set(doorW/2 - 0.06, 0, 0.03);
handle.rotation.x = Math.PI/2;
doorGroup.add(handle);

doorGroup.rotation.y = Math.PI / 2;
doorGroup.position.set(0.03, doorY, D/2 - doorW/2 + 0.6);
doorGroup.castShadow = true;
scene.add(doorGroup);

// ============ 右短墙 + 窗户 ============
const winW = 1.0, winH = 1.2, winY = 1.5;

// 窗下墙
const wallBelowWin = new THREE.Mesh(new THREE.PlaneGeometry(winW, winY - winH/2), matWall);
wallBelowWin.rotation.y = -Math.PI / 2;
wallBelowWin.position.set(W - 0.01, (winY - winH/2)/2, D/2);
wallBelowWin.receiveShadow = true;
scene.add(wallBelowWin);

// 窗上墙
const wallAboveWin = new THREE.Mesh(new THREE.PlaneGeometry(winW, H - winY - winH/2), matWall);
wallAboveWin.rotation.y = -Math.PI / 2;
wallAboveWin.position.set(W - 0.01, winY + winH/2 + (H - winY - winH/2)/2, D/2);
wallAboveWin.receiveShadow = true;
scene.add(wallAboveWin);

// 窗外自然光
const windowLight = new THREE.DirectionalLight(0xbcd4e6, 3);
windowLight.position.set(W - 0.5, winY, D/2);
windowLight.target.position.set(W, winY, D/2);
windowLight.castShadow = false;
scene.add(windowLight);
scene.add(windowLight.target);

// 窗外绿意 — 简单树影
const treePlane = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2.0), new THREE.MeshStandardMaterial({ color: 0x2a4a2a, roughness: 0.8, side: THREE.DoubleSide }));
treePlane.position.set(W + 0.3, winY, D/2);
treePlane.rotation.y = -Math.PI / 2;
scene.add(treePlane);

// 窗框
const winFrame = new THREE.Group();
const frameW = new THREE.Mesh(new THREE.BoxGeometry(0.04, winH + 0.08, 0.06), matWalnut);
frameW.position.set(0, 0, -winW/2 - 0.02);
winFrame.add(frameW);
const frameW2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, winH + 0.08, 0.06), matWalnut);
frameW2.position.set(0, 0, winW/2 + 0.02);
winFrame.add(frameW2);
const frameH = new THREE.Mesh(new THREE.BoxGeometry(winW + 0.08, 0.04, 0.06), matWalnut);
frameH.position.set(0, -winH/2 - 0.02, 0);
winFrame.add(frameH);
const frameH2 = new THREE.Mesh(new THREE.BoxGeometry(winW + 0.08, 0.04, 0.06), matWalnut);
frameH2.position.set(0, winH/2 + 0.02, 0);
winFrame.add(frameH2);
// 横中挺
const mullion = new THREE.Mesh(new THREE.BoxGeometry(winW + 0.08, 0.02, 0.04), matWalnut);
mullion.position.set(0, 0, 0);
winFrame.add(mullion);

winFrame.rotation.y = -Math.PI / 2;
winFrame.position.set(W - 0.02, winY, D/2);
scene.add(winFrame);

// 玻璃
const winGlass = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), new THREE.MeshPhysicalMaterial({ color: 0xaabbcc, roughness: 0.05, metalness: 0.05, transparent: true, opacity: 0.2, clearcoat: 0.5 }));
winGlass.rotation.y = -Math.PI / 2;
winGlass.position.set(W - 0.015, winY, D/2);
scene.add(winGlass);

// 窗帘（简约深灰）
const curtainL = new THREE.Mesh(new THREE.PlaneGeometry(0.45, winH + 0.3), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, side: THREE.DoubleSide }));
curtainL.rotation.y = -Math.PI / 2;
curtainL.position.set(W - 0.03, winY, D/2 - winW/2 - 0.2);
scene.add(curtainL);
const curtainR = new THREE.Mesh(new THREE.PlaneGeometry(0.45, winH + 0.3), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, side: THREE.DoubleSide }));
curtainR.rotation.y = -Math.PI / 2;
curtainR.position.set(W - 0.03, winY, D/2 + winW/2 + 0.2);
scene.add(curtainR);

// ============ 电脑桌（靠窗，享受自然光）============
const deskGroup = new THREE.Group();

// 桌面 — 胡桃木大板
const deskTop = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.035, 0.6), matDeskTop);
deskTop.position.y = 0.75;
deskTop.castShadow = true; deskTop.receiveShadow = true;
deskGroup.add(deskTop);

// 桌腿 — 黑色金属方管
for (let lx of [-0.55, 0.55]) {
  for (let lz of [-0.22, 0.22]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.73, 8), matMetal);
    leg.position.set(lx, 0.365, lz);
    leg.castShadow = true;
    deskGroup.add(leg);
  }
}

// 显示器
const monitorStand = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.08, 12), matMetal);
monitorStand.position.set(0, 0.83, -0.05);
deskGroup.add(monitorStand);

const monitorScreen = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.35, 0.02), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.1, metalness: 0.2 }));
monitorScreen.position.set(0, 1.06, -0.05);
monitorScreen.castShadow = true;
deskGroup.add(monitorScreen);

// 屏幕发光（K线图暗示）
const screenGlow = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.31), new THREE.MeshBasicMaterial({ color: 0x1a3a2a }));
screenGlow.position.set(0, 1.06, -0.035);
deskGroup.add(screenGlow);

// 键盘
const keyboard = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.012, 0.12), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 }));
keyboard.position.set(0, 0.77, 0.15);
deskGroup.add(keyboard);

// 鼠标
const mouse = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 4, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.3 }));
mouse.position.set(0.15, 0.775, 0.15);
deskGroup.add(mouse);

// 台灯
const deskLamp = new THREE.Group();
const lampBase = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.04, 16), matBrass);
deskLamp.add(lampBase);
const lampArm = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.25, 8), matBrass);
lampArm.position.y = 0.15;
lampArm.rotation.x = 0.4;
deskLamp.add(lampArm);
const lampShade = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x3a3028, roughness: 0.6 }));
lampShade.position.set(0.08, 0.24, 0);
deskLamp.add(lampShade);
deskLamp.position.set(0.5, 0.78, 0.2);
deskGroup.add(deskLamp);

const deskSpot = new THREE.PointLight(0xffcc99, 3, 1.5);
deskSpot.position.set(0.5, 0.85, 0.13);
deskGroup.add(deskSpot);

// 咖啡杯
const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.028, 0.07, 12), new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.4 }));
mug.position.set(-0.4, 0.82, 0.1);
deskGroup.add(mug);

deskGroup.position.set(2.5, 0, 1.4);
deskGroup.rotation.y = -0.15;
scene.add(deskGroup);

// ============ 办公椅 ============
const chairGroup = new THREE.Group();
const chairSeat = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.06, 20), matLeather);
chairSeat.position.y = 0.45;
chairSeat.castShadow = true;
chairGroup.add(chairSeat);

const chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.04), matLeather);
chairBack.position.set(0, 0.65, -0.18);
chairBack.castShadow = true;
chairGroup.add(chairBack);

// 椅腿 + 滚轮
for (let a = 0; a < 5; a++) {
  const angle = a * Math.PI * 2 / 5;
  const r = 0.18;
  const wheelLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.2, 8), matMetal);
  wheelLeg.position.set(Math.cos(angle) * r, 0.35, Math.sin(angle) * r);
  wheelLeg.rotation.z = Math.cos(angle) * 0.5;
  wheelLeg.rotation.x = Math.sin(angle) * 0.5;
  chairGroup.add(wheelLeg);
  const wheel = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), matMetal);
  wheel.position.set(Math.cos(angle) * r, 0.25, Math.sin(angle) * r);
  chairGroup.add(wheel);
}

// 气压杆
const gasLift = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.25, 12), matMetal);
gasLift.position.y = 0.3;
chairGroup.add(gasLift);

chairGroup.position.set(2.5, 0, 0.85);
scene.add(chairGroup);

// ============ 休息区沙发（左侧，近门）============
const loungeGroup = new THREE.Group();
const sofaSeat = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.14, 0.65), matLeather);
sofaSeat.position.y = 0.38;
sofaSeat.castShadow = true; sofaSeat.receiveShadow = true;
loungeGroup.add(sofaSeat);

const sofaBack = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.5, 0.1), matLeather);
sofaBack.position.set(0, 0.55, -0.27);
sofaBack.castShadow = true;
loungeGroup.add(sofaBack);

for (let s of [-1, 1]) {
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.28, 0.65), matLeather);
  arm.position.set(s * 0.28, 0.42, 0);
  arm.castShadow = true;
  loungeGroup.add(arm);
}

loungeGroup.position.set(1.0, 0, 1.1);
loungeGroup.rotation.y = 0.25;
scene.add(loungeGroup);

// 沙发旁落地灯
const floorLampGroup = new THREE.Group();
const lampPole = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 1.5, 12), matBrass);
lampPole.position.y = 0.75;
floorLampGroup.add(lampPole);
const lampShade2 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.3, 20), new THREE.MeshStandardMaterial({ color: 0x3a3028, roughness: 0.5 }));
lampShade2.position.y = 1.55;
floorLampGroup.add(lampShade2);
floorLampGroup.position.set(1.4, 0, 1.55);

const floorLight = new THREE.PointLight(0xffbb77, 8, 2.5);
floorLight.position.set(1.4, 1.5, 1.55);
scene.add(floorLight);
scene.add(floorLampGroup);

// 沙发旁小边几
const sideTable = new THREE.Group();
const stTop = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.16, 0.03, 20), matDeskTop);
stTop.position.y = 0.5; stTop.castShadow = true;
sideTable.add(stTop);
const stLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.022, 0.48, 10), matMetal);
stLeg.position.y = 0.24; stLeg.castShadow = true;
sideTable.add(stLeg);
sideTable.position.set(1.6, 0, 1.5);
scene.add(sideTable);

// 边几上的威士忌杯
const whiskyGlass = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.018, 0.08, 12), new THREE.MeshPhysicalMaterial({ color: 0xffcc88, roughness: 0, metalness: 0, transparent: true, opacity: 0.4 }));
whiskyGlass.position.set(1.6, 0.57, 1.5);
scene.add(whiskyGlass);

// ============ 后墙酒架（沙发上方）============
const shelfGroup = new THREE.Group();
for (let row = 0; row < 2; row++) {
  const sh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.025, 0.2), matWalnut);
  sh.position.set(0, 1.35 + row * 0.4, 0);
  sh.castShadow = true;
  shelfGroup.add(sh);

  // 酒瓶
  for (let b = 0; b < 3; b++) {
    const bottle = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.16, 10), new THREE.MeshPhysicalMaterial({ color: b % 2 ? 0x8B6914 : 0x1a3a1a, roughness: 0.15, metalness: 0.1, transparent: true, opacity: 0.75 }));
    bottle.position.set(-0.18 + b * 0.18, 1.5 + row * 0.4, 0);
    bottle.castShadow = true;
    shelfGroup.add(bottle);
  }
}
shelfGroup.position.set(0.9, 0, D - 0.08);
scene.add(shelfGroup);

// ============ 天花板主灯 ============
const mainLight = new THREE.PointLight(0xffcc88, 30, 5);
mainLight.position.set(W/2, 2.45, D/2);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 0.1;
mainLight.shadow.camera.far = 10;
scene.add(mainLight);

// 吊灯装饰
const pendantGroup = new THREE.Group();
const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
cord.position.y = -0.2;
pendantGroup.add(cord);
const shade = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.2, 20), new THREE.MeshStandardMaterial({ color: 0x2a2018, roughness: 0.5, metalness: 0.1 }));
shade.position.y = -0.35;
pendantGroup.add(shade);
pendantGroup.position.set(W/2, 2.5, D/2);
scene.add(pendantGroup);

// ============ 装饰画（后墙，书桌上方）============
const artFrame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.65, 0.02), matBrass);
artFrame.position.set(2.5, 1.75, D - 0.02);
scene.add(artFrame);
const art = new THREE.Mesh(new THREE.PlaneGeometry(0.44, 0.59), new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.6 }));
art.position.set(2.5, 1.75, D - 0.025);
scene.add(art);

// ============ 粒子 ============
const particles = new THREE.BufferGeometry();
const pCount = 60;
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
  pPos[i*3] = Math.random() * W;
  pPos[i*3+1] = Math.random() * H;
  pPos[i*3+2] = Math.random() * D;
}
particles.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({ color: 0xffcc88, size: 0.007, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
const pSys = new THREE.Points(particles, pMat);
scene.add(pSys);

// ============ 踢脚线 ============
const baseboard = new THREE.Mesh(new THREE.BoxGeometry(W - doorW, 0.06, 0.015), matDarkWood);
baseboard.position.set(W/2, 0.03, D - 0.007);
scene.add(baseboard);

// ============ 渲染 ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  pSys.rotation.y += 0.0001;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
