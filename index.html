<!DOCTYPE html>

<style>
*{margin:0;padding:0}body{background:#000;overflow:hidden;font-family:'PingFang SC',sans-serif}

</style>
</head>
<body>
<div id="title">WHISKY CAVE · 私人书房</div>
<div id="ui">🖱 旋转 &nbsp; 滚轮 &nbsp; 右键平移 &nbsp; ⌘+R 重置视角</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const W=3.62,D=1.82,H=2.60;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0c0a08);
scene.fog=new THREE.Fog(0x0c0a08,3,9);

const cam=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,18);
cam.position.set(4.5,2.2,3.5);cam.lookAt(W/2,1.2,D/2);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.shadowMap.type=THREE.PCFSoftShadowMap;
r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.15;
document.body.appendChild(r.domElement);

const ctrl=new OrbitControls(cam,r.domElement);
ctrl.target.set(W/2,1.1,D/2);ctrl.enableDamping=true;ctrl.dampingFactor=.06;
ctrl.minDistance=1.2;ctrl.maxDistance=9;ctrl.maxPolarAngle=1.5;ctrl.update();

// ══════════════════ 自定义纹理 ══════════════════
function texCanvas(w,h,fn){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');fn(ctx,w,h);return new THREE.CanvasTexture(c);
}

// 微水泥墙面纹理
const plasterTex=texCanvas(512,512,(ctx,w,h)=>{
  ctx.fillStyle='#7a6a5a';ctx.fillRect(0,0,w,h);
  for(let i=0;i<8000;i++){
    const x=Math.random()*w,y=Math.random()*h;
    const a=Math.random()*.06;ctx.fillStyle=`rgba(${180+Math.random()*75},${150+Math.random()*50},${120+Math.random()*40},${a})`;
    ctx.fillRect(x,y,2+Math.random()*3,2+Math.random()*3);
  }
});
plasterTex.wrapS=plasterTex.wrapT=THREE.RepeatWrapping;

// 胡桃木纹理
const walnutTex=texCanvas(512,256,(ctx,w,h)=>{
  const base=ctx.createLinearGradient(0,0,0,h);
  base.addColorStop(0,'#4a3020');base.addColorStop(.3,'#3d2518');base.addColorStop(.6,'#4a3020');base.addColorStop(1,'#352014');
  ctx.fillStyle=base;ctx.fillRect(0,0,w,h);
  for(let i=0;i<60;i++){
    ctx.strokeStyle=`rgba(60,35,20,${.15+Math.random()*.2})`;
    ctx.lineWidth=1+Math.random()*3;ctx.beginPath();
    const y=Math.random()*h;ctx.moveTo(0,y);
    for(let x=0;x<w;x+=20)ctx.lineTo(x,y+Math.sin(x*.01+i)*8);
    ctx.stroke();
  }
  for(let i=0;i<2000;i++){
    const x=Math.random()*w,y=Math.random()*h;
    ctx.fillStyle=`rgba(40,20,10,${Math.random()*.1})`;ctx.fillRect(x,y,1,1);
  }
});
walnutTex.wrapS=walnutTex.wrapT=THREE.RepeatWrapping;

// 地板纹理（深色橡木）
const floorTex=texCanvas(512,512,(ctx,w,h)=>{
  const base=ctx.createLinearGradient(0,0,w,0);
  base.addColorStop(0,'#1a1008');base.addColorStop(.5,'#1c1209');base.addColorStop(1,'#180e06');
  ctx.fillStyle=base;ctx.fillRect(0,0,w,h);
  for(let plank=0;plank<8;plank++){
    const y=plank*64;
    ctx.fillStyle=`rgba(25,15,8,${.3+Math.random()*.3})`;ctx.fillRect(0,y,w,62);
    ctx.strokeStyle='#0a0503';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
    for(let i=0;i<200;i++){
      ctx.fillStyle=`rgba(30,18,10,${Math.random()*.08})`;ctx.fillRect(Math.random()*w,y+Math.random()*60,1+Math.random()*2,1);
    }
  }
});
floorTex.wrapS=floorTex.wrapT=THREE.RepeatWrapping;floorTex.repeat.set(3,1);

const matWall=new THREE.MeshStandardMaterial({map:plasterTex,roughness:.82,metalness:0,color:0x908070});
const matWood=new THREE.MeshStandardMaterial({map:walnutTex,roughness:.42,metalness:.06});
const matDarkWood=new THREE.MeshStandardMaterial({color:0x2a1810,roughness:.48,metalness:.06});
const matFloorM=new THREE.MeshStandardMaterial({map:floorTex,roughness:.5,metalness:.04});
const matLeather=new THREE.MeshStandardMaterial({color:0x3d1f0d,roughness:.55,metalness:.03});
const matBrass=new THREE.MeshStandardMaterial({color:0xb89650,roughness:.22,metalness:.88});
const matMetal=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.28,metalness:.75});
const matGlass=new THREE.MeshPhysicalMaterial({color:0xffffff,roughness:.02,metalness:.02,transparent:true,opacity:.25,clearcoat:.4});
const matMonitor=new THREE.MeshStandardMaterial({color:0x111111,roughness:.1,metalness:.2});

// ══════════════════ 房间壳体 ══════════════════
// 地板
const flr=new THREE.Mesh(new THREE.PlaneGeometry(W,D),matFloorM);
flr.rotation.x=-Math.PI/2;flr.position.set(W/2,0,D/2);flr.receiveShadow=true;scene.add(flr);

// 天花板横梁
for(let i=0;i<5;i++){
  const bm=new THREE.Mesh(new THREE.BoxGeometry(.1,.07,D),matDarkWood);
  bm.position.set(.25+i*.8,H-.035,D/2);bm.castShadow=true;bm.receiveShadow=true;scene.add(bm);
}

// 天花板
const ceil=new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshStandardMaterial({color:0x1a120a,roughness:.85}));
ceil.rotation.x=Math.PI/2;ceil.position.set(W/2,H,D/2);scene.add(ceil);

// 后长墙
const bkWall=new THREE.Mesh(new THREE.PlaneGeometry(W,H),matWall);
bkWall.position.set(W/2,H/2,D);bkWall.receiveShadow=true;scene.add(bkWall);

// ══════════════════ 左短墙 + 推拉门 ══════════════════
const DOOR_W=1.2,DOOR_H=2.1;

// 门上墙面
const wallUpDr=new THREE.Mesh(new THREE.PlaneGeometry(DOOR_W,H-DOOR_H),matWall);
wallUpDr.rotation.y=Math.PI/2;wallUpDr.position.set(.01,DOOR_H+(H-DOOR_H)/2,D-DOOR_W/2);wallUpDr.receiveShadow=true;scene.add(wallUpDr);

// 门右侧墙面
const wallRtDr=new THREE.Mesh(new THREE.PlaneGeometry(D-DOOR_W,H),matWall);
wallRtDr.rotation.y=Math.PI/2;wallRtDr.position.set(.01,H/2,D-(D-DOOR_W)/2+.01);wallRtDr.receiveShadow=true;scene.add(wallRtDr);

// 门套（黄铜轨道 + 木框）
const doorTrack=new THREE.Group();
// 上轨道
const track=new THREE.Mesh(new THREE.BoxGeometry(DOOR_W+.2,.02,.04),matMetal);
track.position.y=DOOR_H+.01;doorTrack.add(track);
// 左侧框
const jambL=new THREE.Mesh(new THREE.BoxGeometry(.06,DOOR_H,.08),matDarkWood);
jambL.position.set(-DOOR_W/2-.02,DOOR_H/2,0);jambL.castShadow=true;doorTrack.add(jambL);
// 右侧框
const jambR=new THREE.Mesh(new THREE.BoxGeometry(.06,DOOR_H,.08),matDarkWood);
jambR.position.set(DOOR_W/2+.02,DOOR_H/2,0);jambR.castShadow=true;doorTrack.add(jambR);
// 上框
const jambT=new THREE.Mesh(new THREE.BoxGeometry(DOOR_W+.12,.06,.08),matDarkWood);
jambT.position.set(0,DOOR_H+.02,0);jambT.castShadow=true;doorTrack.add(jambT);

doorTrack.rotation.y=Math.PI/2;doorTrack.position.set(.04,0,D-DOOR_W/2);
scene.add(doorTrack);

// 门扇（两扇推拉 + 磨砂玻璃）
for(let si=0;si<2;si++){
  const leaf=new THREE.Group();
  // 木框
  const df=new THREE.Mesh(new THREE.BoxGeometry(DOOR_W/2-.02,.08,.05),matDarkWood);
  df.position.y=DOOR_H/2-.04;leaf.add(df);
  const dfb=new THREE.Mesh(new THREE.BoxGeometry(DOOR_W/2-.02,.08,.05),matDarkWood);
  dfb.position.y=-DOOR_H/2+.04;leaf.add(dfb);
  const dfl=new THREE.Mesh(new THREE.BoxGeometry(.05,DOOR_H-.16,.05),matDarkWood);
  dfl.position.x=-DOOR_W/4+.02;leaf.add(dfl);
  const dfr=new THREE.Mesh(new THREE.BoxGeometry(.05,DOOR_H-.16,.05),matDarkWood);
  dfr.position.x=DOOR_W/4-.02;leaf.add(dfr);
  // 玻璃
  const gl=new THREE.Mesh(new THREE.PlaneGeometry(DOOR_W/2-.1,DOOR_H-.24),new THREE.MeshPhysicalMaterial({color:0x8899aa,roughness:.03,metalness:.05,transparent:true,opacity:.22,clearcoat:.5}));
  gl.position.z=.015;leaf.add(gl);
  // 拉手
  const hdl=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,.22,10),matBrass);
  hdl.position.set(si===0?-DOOR_W/4+.04:DOOR_W/4-.04,0,.035);hdl.rotation.x=Math.PI/2;leaf.add(hdl);

  leaf.rotation.y=Math.PI/2;
  leaf.position.set(.05,DOOR_H/2,D-DOOR_W/4+si*DOOR_W/2);
  scene.add(leaf);
}

// ══════════════════ 右短墙 + 窗户 ══════════════════
const WIN_W=.95,WIN_H=1.15,WIN_Y=1.55;

// 窗下墙
const wlBlw=new THREE.Mesh(new THREE.PlaneGeometry(WIN_W,WIN_Y-WIN_H/2),matWall);
wlBlw.rotation.y=-Math.PI/2;wlBlw.position.set(W-.01,(WIN_Y-WIN_H/2)/2,D/2);wlBlw.receiveShadow=true;scene.add(wlBlw);

// 窗上墙
const wlAbv=new THREE.Mesh(new THREE.PlaneGeometry(WIN_W,H-WIN_Y-WIN_H/2),matWall);
wlAbv.rotation.y=-Math.PI/2;wlAbv.position.set(W-.01,WIN_Y+WIN_H/2+(H-WIN_Y-WIN_H/2)/2,D/2);wlAbv.receiveShadow=true;scene.add(wlAbv);

// 窗户外景（发光板模拟天空）
const skyGlow=new THREE.Mesh(new THREE.PlaneGeometry(WIN_W+.3,WIN_H+.3),new THREE.MeshBasicMaterial({color:0x8899aa}));
skyGlow.position.set(W+.2,WIN_Y,D/2);skyGlow.rotation.y=-Math.PI/2;scene.add(skyGlow);

// 窗外树木剪影
const treeCan=new THREE.Group();
for(let t=0;t<5;t++){
  const tw=new THREE.Mesh(new THREE.CylinderGeometry(.02,.04,1+Math.random(),8),matDarkWood);
  tw.position.set(W+.15,WIN_Y-.4+Math.random()*.6,D/2-.3+Math.random()*.6);treeCan.add(tw);
  const tc=new THREE.Mesh(new THREE.SphereGeometry(.12+Math.random()*.15,8,6),new THREE.MeshStandardMaterial({color:0x1a3a1a,roughness:.8}));
  tc.position.set(W+.15,WIN_Y+.2+Math.random()*.3,D/2-.3+Math.random()*.6);treeCan.add(tc);
}
scene.add(treeCan);

// 窗框（双层：内木外铁）
const wf=new THREE.Group();
[{w:WIN_W,h:.05},{w:.05,h:WIN_H},{w:.05,h:WIN_H}].forEach((d,i)=>{
  const part=new THREE.Mesh(new THREE.BoxGeometry(d.w,d.h,.06),i?matMetal:matWood);
  if(i===0)part.position.set(0,-WIN_H/2,0);else part.position.set((i===1?-1:1)*(WIN_W/2-.025),0,0);
  wf.add(part);
});
const wfMid=new THREE.Mesh(new THREE.BoxGeometry(WIN_W,.025,.06),matWood);wfMid.position.set(0,.05,0);wf.add(wfMid);
wf.rotation.y=-Math.PI/2;wf.position.set(W-.015,WIN_Y,D/2);scene.add(wf);

// 窗台
const sill=new THREE.Mesh(new THREE.BoxGeometry(WIN_W+.15,.03,.12),matDarkWood);
sill.rotation.y=-Math.PI/2;sill.position.set(W-.04,WIN_Y-WIN_H/2-.02,D/2);sill.castShadow=true;sill.receiveShadow=true;scene.add(sill);

// 自然光
const winLight=new THREE.DirectionalLight(0xdce8f0,3.5);
winLight.position.set(W-.6,WIN_Y+.3,D/2);winLight.target.position.set(W-.1,WIN_Y,D/2);
scene.add(winLight);scene.add(winLight.target);

// 窗帘（灰色亚麻褶皱）
for(let s=0;s<2;s++){
  const crt=new THREE.Mesh(new THREE.PlaneGeometry(.42,WIN_H+.25),new THREE.MeshStandardMaterial({color:0x3a3836,roughness:.92,side:THREE.DoubleSide}));
  crt.rotation.y=-Math.PI/2;crt.position.set(W-.02,WIN_Y,D/2+(s===0?-1:1)*(WIN_W/2+.18));scene.add(crt);
}

// ══════════════════ 电脑桌（靠窗区）══════════════════
const deskGroup=new THREE.Group();

// 桌面 — 胡桃木大板，弧形边
const dtGeom=new THREE.BoxGeometry(1.25,.04,.58);
const dtMesh=new THREE.Mesh(dtGeom,matWood);dtMesh.position.y=.74;dtMesh.castShadow=true;dtMesh.receiveShadow=true;deskGroup.add(dtMesh);

// 金属框架腿
const legGeom=new THREE.CylinderGeometry(.018,.022,.72,12);
for(let lx of[-.52,.52])for(let lz of[-.22,.22]){
  const lg=new THREE.Mesh(legGeom,matMetal);lg.position.set(lx,.36,lz);lg.castShadow=true;deskGroup.add(lg);
}

// 横向加强杆
const crossBar=new THREE.Mesh(new THREE.BoxGeometry(1.05,.012,.012),matMetal);
crossBar.position.set(0,.15,.22);deskGroup.add(crossBar);
const crossBar2=new THREE.Mesh(new THREE.BoxGeometry(1.05,.012,.012),matMetal);
crossBar2.position.set(0,.15,-.22);deskGroup.add(crossBar2);

// 显示器（窄边框曲面感）
const monGrp=new THREE.Group();
const monStandBase=new THREE.Mesh(new THREE.CylinderGeometry(.06,.07,.015,20),matMetal);
monStandBase.position.y=.04;monGrp.add(monStandBase);
const monStandPole=new THREE.Mesh(new THREE.CylinderGeometry(.015,.018,.1,10),matMetal);
monStandPole.position.y=.1;monGrp.add(monStandPole);
const monStandArm=new THREE.Mesh(new THREE.BoxGeometry(.04,.02,.08),matMetal);
monStandArm.position.y=.16;monGrp.add(monStandArm);
const monScr=new THREE.Mesh(new THREE.BoxGeometry(.52,.33,.018),matMonitor);
monScr.position.y=.35;monScr.castShadow=true;monGrp.add(monScr);
const monGlow=new THREE.Mesh(new THREE.PlaneGeometry(.48,.3),new THREE.MeshBasicMaterial({color:0x1a3a2a}));
monGlow.position.set(0,.35,.012);monGrp.add(monGlow);
monGrp.position.set(0,.77,-.1);deskGroup.add(monGrp);

// 键盘+鼠标
const kbd=new THREE.Mesh(new THREE.BoxGeometry(.33,.01,.1),new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.5}));
kbd.position.set(0,.755,.14);deskGroup.add(kbd);
const mse=new THREE.Mesh(new THREE.SphereGeometry(.022,8,4,0,Math.PI*2,0,Math.PI/2.2),matMetal);
mse.position.set(.17,.758,.14);deskGroup.add(mse);

// 台灯 — 黄铜折叠臂
const tLamp=new THREE.Group();
const tlBase=new THREE.Mesh(new THREE.CylinderGeometry(.05,.06,.03,20),matBrass);tlBase.position.y=.015;tLamp.add(tlBase);
const tlArm1=new THREE.Mesh(new THREE.CylinderGeometry(.008,.008,.2,8),matBrass);
tlArm1.position.y=.1;tlArm1.rotation.z=.4;tLamp.add(tlArm1);
const tlArm2=new THREE.Mesh(new THREE.CylinderGeometry(.008,.008,.18,8),matBrass);
tlArm2.position.set(.08,.22,0);tlArm2.rotation.z=-.15;tLamp.add(tlArm2);
const tlShade=new THREE.Mesh(new THREE.ConeGeometry(.07,.1,16,1,true),new THREE.MeshStandardMaterial({color:0x3a3020,roughness:.5,side:THREE.DoubleSide}));
tlShade.position.set(.18,.28,0);tlShade.rotation.z=-.25;tlShade.rotation.x=-.3;tLamp.add(tlShade);
tLamp.position.set(.52,.75,.2);deskGroup.add(tLamp);

const deskLampLight=new THREE.PointLight(0xffddbb,4,1.5,.5);
deskLampLight.position.set(.6,.82,.13);deskGroup.add(deskLampLight);

// 咖啡杯 + 威士忌杯
const mugC=new THREE.Mesh(new THREE.CylinderGeometry(.028,.026,.06,14),new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.35,metalness:.2}));
mugC.position.set(-.38,.79,.08);deskGroup.add(mugC);
const mugCHandle=new THREE.Mesh(new THREE.TorusGeometry(.018,.005,8,8),matMetal);
mugCHandle.position.set(-.41,.77,.08);mugCHandle.rotation.y=Math.PI/2;deskGroup.add(mugCHandle);

// 笔记本+笔
const notebook=new THREE.Mesh(new THREE.BoxGeometry(.18,.008,.25),new THREE.MeshStandardMaterial({color:0xf5f0e8,roughness:.7}));
notebook.position.set(-.25,.77,.2);deskGroup.add(notebook);

deskGroup.position.set(2.5,0,1.4);deskGroup.rotation.y=-.1;scene.add(deskGroup);

// ══════════════════ 办公椅 ══════════════════
const offChair=new THREE.Group();
// 五星脚
for(let a=0;a<5;a++){
  const ang=a*Math.PI*2/5,r2=.16;
  const sp=new THREE.Mesh(new THREE.CylinderGeometry(.006,.008,.14,8),matMetal);
  sp.position.set(Math.cos(ang)*r2,.28,Math.sin(ang)*r2);
  sp.rotation.z=Math.cos(ang)*.5;sp.rotation.x=Math.sin(ang)*.5;offChair.add(sp);
  const wh=new THREE.Mesh(new THREE.SphereGeometry(.018,8,8),matMetal);
  wh.position.set(Math.cos(ang)*r2,.21,Math.sin(ang)*r2);offChair.add(wh);
}
const gas=new THREE.Mesh(new THREE.CylinderGeometry(.02,.022,.22,12),matMetal);
gas.position.y=.33;offChair.add(gas);

// 座垫（MeshStandardMaterial + 靠背）
const seatPad=new THREE.Mesh(new THREE.CylinderGeometry(.2,.21,.05,24),new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:.65}));
seatPad.position.y=.45;seatPad.castShadow=true;offChair.add(seatPad);

const bkPad=new THREE.Mesh(new THREE.BoxGeometry(.38,.35,.04),new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:.65}));
bkPad.position.set(0,.64,-.16);bkPad.castShadow=true;offChair.add(bkPad);

const bkFrame=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,.3,8),matMetal);
bkFrame.position.y=.57;bkFrame.rotation.x=.2;offChair.add(bkFrame);

offChair.position.set(2.5,0,.85);scene.add(offChair);

// ══════════════════ 休息沙发 ══════════════════
const sofaGrp=new THREE.Group();
// 座垫
const sSeat=new THREE.Mesh(new THREE.BoxGeometry(.62,.13,.6),matLeather);
sSeat.position.y=.36;sSeat.castShadow=true;sSeat.receiveShadow=true;sofaGrp.add(sSeat);
// 靠背（拉扣效果用分段暗示）
const sBack=new THREE.Mesh(new THREE.BoxGeometry(.62,.48,.08),matLeather);
sBack.position.set(0,.54,-.26);sBack.castShadow=true;sofaGrp.add(sBack);
// 扶手 ×2
[-1,1].forEach(s=>{
  const arm=new THREE.Mesh(new THREE.BoxGeometry(.07,.26,.6),matLeather);
  arm.position.set(s*.28,.4,0);arm.castShadow=true;sofaGrp.add(arm);
});
// 铆钉
for(let i=0;i<5;i++){
  const st=new THREE.Mesh(new THREE.SphereGeometry(.01,6,6),matBrass);
  st.position.set(-.24+i*.12,.5,-.28);sofaGrp.add(st);
}
// 靠垫
const cushion=new THREE.Mesh(new THREE.BoxGeometry(.35,.28,.06),new THREE.MeshStandardMaterial({color:0x5a3a2a,roughness:.75}));
cushion.position.set(0,.38,-.2);cushion.rotation.x=-.3;sofaGrp.add(cushion);

sofaGrp.position.set(.9,0,1.15);sofaGrp.rotation.y=.2;scene.add(sofaGrp);

// 脚凳
const ott=new THREE.Mesh(new THREE.BoxGeometry(.4,.22,.4),matLeather);
ott.position.set(1.42,.11,1.35);ott.rotation.y=.35;ott.castShadow=true;ott.receiveShadow=true;scene.add(ott);

// 沙发旁落地灯
const flGrp=new THREE.Group();
const flPole=new THREE.Mesh(new THREE.CylinderGeometry(.014,.016,1.45,12),matBrass);flPole.position.y=.73;flGrp.add(flPole);
const flBase=new THREE.Mesh(new THREE.CylinderGeometry(.08,.09,.04,20),matBrass);flBase.position.y=.02;flGrp.add(flBase);
const flShade=new THREE.Mesh(new THREE.CylinderGeometry(.14,.18,.25,24,1,true),new THREE.MeshStandardMaterial({color:0x3a3020,roughness:.55,side:THREE.DoubleSide}));
flShade.position.y=1.5;flGrp.add(flShade);
flGrp.position.set(1.35,0,1.6);scene.add(flGrp);
const flLight=new THREE.PointLight(0xffcc88,6,2.2,.5);flLight.position.set(1.35,1.48,1.6);scene.add(flLight);

// 边几 — 树桩截面造型
const sideT=new THREE.Group();
const stTop=new THREE.Mesh(new THREE.CylinderGeometry(.14,.15,.03,24),matDarkWood);stTop.position.y=.48;stTop.castShadow=true;sideT.add(stTop);
const stBody=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,.46,16),matDarkWood);stBody.position.y=.23;sideT.add(stBody);
const stFeet=[];
for(let a=0;a<3;a++){
  const f=new THREE.Mesh(new THREE.SphereGeometry(.025,8,8),matBrass);
  f.position.set(Math.cos(a*Math.PI*2/3)*.08,.02,Math.sin(a*Math.PI*2/3)*.08);sideT.add(f);
}
sideT.position.set(1.6,0,1.55);scene.add(sideT);

// 边几上威士忌杯+醒酒器
const wGlass=new THREE.Mesh(new THREE.CylinderGeometry(.024,.018,.08,14),new THREE.MeshPhysicalMaterial({color:0xffcc66,roughness:.02,metalness:.05,transparent:true,opacity:.45,clearcoat:.6}));
wGlass.position.set(1.6,.56,1.55);scene.add(wGlass);

const decanter=new THREE.Group();
const decBody=new THREE.Mesh(new THREE.SphereGeometry(.05,16,16),new THREE.MeshPhysicalMaterial({color:0x8B6914,roughness:.08,metalness:.05,transparent:true,opacity:.65,clearcoat:.5}));
decBody.scale.set(1,1.3,1);decBody.position.y=.04;decanter.add(decBody);
const decNeck=new THREE.Mesh(new THREE.CylinderGeometry(.018,.022,.07,12),new THREE.MeshStandardMaterial({color:0x8B6914,roughness:.1}));
decNeck.position.y=.11;decanter.add(decNeck);
decanter.position.set(1.5,.55,1.55);scene.add(decanter);

// ══════════════════ 后墙酒架 ══════════════════
const shelfUnit=new THREE.Group();
for(let row=0;row<3;row++){
  const sh=new THREE.Mesh(new THREE.BoxGeometry(.75,.025,.22),matWood);
  sh.position.set(0,1.2+row*.4,0);sh.castShadow=true;shelfUnit.add(sh);
  // 酒瓶
  for(let bi=0;bi<4;bi++){
    const bt=new THREE.Mesh(new THREE.CylinderGeometry(.022,.024,.17,12),new THREE.MeshPhysicalMaterial({color:bi%3===0?0x1a3a1a:bi%3===1?0x8B6914:0x3a1a1a,roughness:.12,metalness:.08,transparent:true,opacity:.72}));
    bt.position.set(-.28+bi*.18,1.35+row*.4,0);bt.castShadow=true;shelfUnit.add(bt);
  }
}
shelfUnit.position.set(.75,0,D-.09);scene.add(shelfUnit);

// ══════════════════ 后墙书架 ══════════════════
const bkUnit=new THREE.Group();
for(let row=0;row<3;row++){
  const sh=new THREE.Mesh(new THREE.BoxGeometry(.45,.02,.18),matWood);
  sh.position.set(0,1.1+row*.48,0);sh.castShadow=true;bkUnit.add(sh);
  for(let bi=0;bi<6;bi++){
    const bk=new THREE.Mesh(new THREE.BoxGeometry(.028,.22+Math.random()*.1,.14),new THREE.MeshStandardMaterial({color:[0x5c1a1a,0x1a3a1a,0x332244,0x8B6914,0x2a2a3a,0x3a2020,0x1a2a3a,0x4a2a1a][row*2+bi%6],roughness:.7}));
    bk.position.set(-.16+bi*.064,1.25+row*.48,0);bk.castShadow=true;bkUnit.add(bk);
  }
}
bkUnit.position.set(3.0,0,D-.09);scene.add(bkUnit);

// ══════════════════ 主灯 ══════════════════
const mainLight=new THREE.PointLight(0xffcc88,25,4.5,.6);
mainLight.position.set(W/2,2.44,D/2);mainLight.castShadow=true;
mainLight.shadow.mapSize.set(1024,1024);mainLight.shadow.camera.near=.1;mainLight.shadow.camera.far=10;
scene.add(mainLight);

// 吊灯
const chand=new THREE.Group();
const chCord=new THREE.Mesh(new THREE.CylinderGeometry(.004,.004,.35,8),new THREE.MeshStandardMaterial({color:0x111}));
chCord.position.y=-.18;chand.add(chCord);
const chShade=new THREE.Mesh(new THREE.CylinderGeometry(.09,.14,.22,24,1,true),new THREE.MeshStandardMaterial({color:0x241810,roughness:.45,metalness:.1,side:THREE.DoubleSide}));
chShade.position.y=-.35;chand.add(chShade);
// 灯泡发光体
const chBulb=new THREE.Mesh(new THREE.SphereGeometry(.04,12,12),new THREE.MeshBasicMaterial({color:0xffdd99}));
chBulb.position.y=-.4;chand.add(chBulb);
chand.position.set(W/2,2.55,D/2);scene.add(chand);

// ══════════════════ 环境光/补光 ══════════════════
const ambient=new THREE.AmbientLight(0x3a2010,.45);scene.add(ambient);
const hemi=new THREE.HemisphereLight(0x886644,0x1a1008,.3);scene.add(hemi);

// 墙脚灯带（洗墙效果）
const stripLight=new THREE.PointLight(0xffaa66,4,2.5,.8);
stripLight.position.set(W/2,.1,D-.05);scene.add(stripLight);

// ══════════════════ 装饰画 ══════════════════
const painting=new THREE.Mesh(new THREE.PlaneGeometry(.44,.56),new THREE.MeshStandardMaterial({color:0x5a4030,roughness:.5}));
painting.position.set(2.5,1.7,D-.02);scene.add(painting);
const pFrame=new THREE.Mesh(new THREE.BoxGeometry(.5,.62,.02),matBrass);
pFrame.position.set(2.5,1.7,D-.025);scene.add(pFrame);

// ══════════════════ 浮尘粒子 ══════════════════
const pts=new THREE.BufferGeometry();
const pArr=new Float32Array(50*3);
for(let i=0;i<50;i++){pArr[i*3]=Math.random()*W;pArr[i*3+1]=Math.random()*H;pArr[i*3+2]=Math.random()*D;}
pts.setAttribute('position',new THREE.BufferAttribute(pArr,3));
const ptsSys=new THREE.Points(pts,new THREE.PointsMaterial({color:0xffcc88,size:.006,transparent:true,opacity:.35,blending:THREE.AdditiveBlending}));
scene.add(ptsSys);

// 踢脚线
const bsBoard=new THREE.Mesh(new THREE.BoxGeometry(W,.05,.012),matDarkWood);
bsBoard.position.set(W/2,.025,D-.006);scene.add(bsBoard);

// ══════════════════ 渲染 ══════════════════
function anim(){
  requestAnimationFrame(anim);
  ctrl.update();
  ptsSys.rotation.y+=.00008;
  r.render(scene,cam);
}
anim();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);
});

window.addEventListener('keydown',e=>{
  if(e.metaKey&&e.key==='r'){e.preventDefault();
    cam.position.set(4.5,2.2,3.5);ctrl.target.set(W/2,1.2,D/2);ctrl.update();}
});
</script>
</body>
</html>
