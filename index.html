<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>威士忌洞穴 · 私人休闲区 3.62m×1.82m</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'PingFang SC',sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(20,15,10,0.9); color: #c8a96e; padding: 14px 28px;
    border: 1px solid #5a3e28; border-radius: 40px; font-size: 14px;
    letter-spacing: 3px; pointer-events: none; z-index: 10;
  }
  #info {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    color: #c8a96e; font-size: 13px; letter-spacing: 2px;
    opacity: 0.7; pointer-events: none; z-index: 10;
  }
  #legend {
    position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
    color: #8b7355; font-size: 11px; line-height: 2;
    pointer-events: none; z-index: 10;
  }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
</style>
</head>
<body>
<div id="info">🥃 WHISKY CAVE · 威士忌洞穴</div>
<div id="legend">
  <div><span class="dot" style="background:#c8a96e"></span>琥珀灯光</div>
  <div><span class="dot" style="background:#3d2b1f"></span>深胡桃木</div>
  <div><span class="dot" style="background:#2a1f14"></span>洞石墙面</div>
  <div><span class="dot" style="background:#4a3728"></span>真皮沙发</div>
</div>
<div id="ui">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移 &nbsp;|&nbsp; 3.62m × 1.82m</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ 场景 ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0806, 0.0008);
scene.background = new THREE.Color(0x0a0806);

const W = 3.62, D = 1.82, H = 2.60;

// ============ 相机 ============
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 20);
camera.position.set(5, 2.2, 4);
camera.lookAt(W/2, H/2, D/2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ============ 控制器 ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(W/2, 1.1, D/2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5; controls.maxDistance = 10;
controls.maxPolarAngle = Math.PI * 0.58;
controls.update();

// ============ 灯光 ============
// 环境光 — 极暗的暖色
const ambient = new THREE.AmbientLight(0x3a2510, 0.5);
scene.add(ambient);

// 主吊灯 — 黄铜吊灯，暖琥珀光
const chandelier = new THREE.PointLight(0xff9930, 60, 5, 0.5);
chandelier.position.set(W/2, 2.45, D/2);
chandelier.castShadow = true;
chandelier.shadow.mapSize.set(1024, 1024);
chandelier.shadow.camera.near = 0.1;
chandelier.shadow.camera.far = 10;
scene.add(chandelier);

// 吊灯灯泡
const bulbGeo = new THREE.SphereGeometry(0.06, 16, 16);
const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffcc66 });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.copy(chandelier.position);
scene.add(bulb);

// 吧台上方射灯
const spotBar = new THREE.SpotLight(0xffbb77, 30, 4, Math.PI/5, 0.3, 0.4);
spotBar.position.set(0.8, 2.35, 0.5);
spotBar.target.position.set(0.5, 1.0, 0.6);
spotBar.castShadow = true;
scene.add(spotBar);
scene.add(spotBar.target);

// 沙发旁落地灯
const floorLamp = new THREE.PointLight(0xffaa55, 15, 2.5, 0.6);
floorLamp.position.set(2.4, 1.7, D - 0.3);
floorLamp.castShadow = true;
scene.add(floorLamp);

// 墙面洗墙灯带（暖色）
const wallWashTop = new THREE.PointLight(0xffbb88, 8, 3, 1);
wallWashTop.position.set(W/2, H - 0.15, 0.05);
scene.add(wallWashTop);

// ============ 房间结构 ============
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a1f14, roughness: 0.85, metalness: 0.05 });
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.55, metalness: 0.1 });
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x1c130a, roughness: 0.9, metalness: 0 });

// 地板
const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, D), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(W/2, 0, D/2);
floor.receiveShadow = true;
scene.add(floor);

// 地毯 — 波斯纹样
const rugGeo = new THREE.PlaneGeometry(2.0, 1.2);
const rugMat = new THREE.MeshStandardMaterial({ color: 0x5c1a1a, roughness: 1, metalness: 0 });
const rug = new THREE.Mesh(rugGeo, rugMat);
rug.rotation.x = -Math.PI / 2;
rug.position.set(2.0, 0.003, D/2);
rug.receiveShadow = true;
scene.add(rug);

// 后墙 (长边，靠走廊)
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(W, H), wallMat);
backWall.position.set(W/2, H/2, D);
backWall.receiveShadow = true;
scene.add(backWall);

// 两侧短墙
const sideWallMat = new THREE.MeshStandardMaterial({ color: 0x241810, roughness: 0.8, metalness: 0.05 });
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(D, H), sideWallMat);
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(0, H/2, D/2);
leftWall.receiveShadow = true;
scene.add(leftWall);

const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(D, H), sideWallMat);
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(W, H/2, D/2);
rightWall.receiveShadow = true;
scene.add(rightWall);

// 洞石装饰板 — 左侧短墙 (入墙酒架)
const stonePanel = new THREE.Mesh(
  new THREE.PlaneGeometry(D - 0.1, H - 0.4),
  new THREE.MeshStandardMaterial({ color: 0x3a2a1c, roughness: 0.7, metalness: 0.05 })
);
stonePanel.rotation.y = Math.PI / 2;
stonePanel.position.set(0.05, H/2, D/2);
stonePanel.receiveShadow = true;
scene.add(stonePanel);

// ============ 入墙酒架（左侧短墙）============
function createWhiskyShelf(x, y, z, ry) {
  const group = new THREE.Group();
  const wood = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.4, metalness: 0.1 });
  const bottleGreen = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.2, metalness: 0.3, transparent: true, opacity: 0.8 });
  const bottleBrown = new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.2, metalness: 0.3, transparent: true, opacity: 0.8 });

  // 隔板
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.03, 0.25), wood);
  shelf.position.set(0, y - x, 0);
  shelf.castShadow = true; shelf.receiveShadow = true;
  group.add(shelf);

  // 酒瓶
  for (let i = 0; i < 4; i++) {
    const mat = i % 2 === 0 ? bottleGreen : bottleBrown;
    const bottle = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.18, 12), mat);
    bottle.position.set(-0.25 + i * 0.16, y - x + 0.1, 0);
    bottle.castShadow = true;
    group.add(bottle);
  }

  // 威士忌醒酒器
  const decanter = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshPhysicalMaterial({ color: 0x8B6914, roughness: 0.1, metalness: 0, transparent: true, opacity: 0.7, clearcoat: 0.3 }));
  body.position.y = 0.04;
  decanter.add(body);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.08, 12), new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.1, metalness: 0 }));
  neck.position.y = 0.1;
  decanter.add(neck);
  decanter.position.set(-0.28, y - x + 0.12, 0.12);
  group.add(decanter);

  // 酒杯
  const glass = new THREE.Group();
  const bowl = new THREE.Mesh(new THREE.SphereGeometry(0.025, 12, 8, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0, metalness: 0, transparent: true, opacity: 0.4, clearcoat: 0.5 }));
  bowl.position.y = 0.06; bowl.rotation.x = Math.PI;
  glass.add(bowl);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, 0.06, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0, metalness: 0, transparent: true, opacity: 0.5 }));
  glass.add(stem);
  glass.position.set(0.28, y - x + 0.1, 0.12);
  group.add(glass);

  group.position.set(x, 0, z);
  group.rotation.y = ry;
  return group;
}

// 墙面酒架
for (let row = 0; row < 3; row++) {
  const shelf = createWhiskyShelf(0.08, 1.2 + row * 0.35, 0.6, Math.PI / 2);
  scene.add(shelf);
}

// ============ 吧台柜（左前角）============
const barGroup = new THREE.Group();
const darkWood = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.35, metalness: 0.1 });
const barTop = new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.3, metalness: 0.15 });

// 柜体
const cabinet = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.05, 0.5), darkWood);
cabinet.position.set(0.35, 0.525, 0.45);
cabinet.castShadow = true; cabinet.receiveShadow = true;
barGroup.add(cabinet);

// 台面 — 深色石材
const top = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.04, 0.55), barTop);
top.position.set(0.35, 1.07, 0.45);
top.castShadow = true; top.receiveShadow = true;
barGroup.add(top);

// 台面酒瓶+酒杯
const barBottle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.22, 12), new THREE.MeshPhysicalMaterial({ color: 0x8B6914, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.8, clearcoat: 0.3 }));
barBottle.position.set(0.15, 1.2, 0.45);
barBottle.castShadow = true;
barGroup.add(barBottle);

const barGlass1 = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.02, 0.1, 12), new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0, metalness: 0, transparent: true, opacity: 0.4 }));
barGlass1.position.set(0.28, 1.13, 0.52);
barGroup.add(barGlass1);

const barGlass2 = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.02, 0.1, 12), new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0, metalness: 0, transparent: true, opacity: 0.4 }));
barGlass2.position.set(0.28, 1.13, 0.38);
barGroup.add(barGlass2);

// 冰桶
const iceBucket = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.08, 16), new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.2, metalness: 0.8 }));
iceBucket.position.set(0.48, 1.11, 0.45);
iceBucket.castShadow = true;
barGroup.add(iceBucket);

scene.add(barGroup);

// ============ 切斯特菲尔德单人沙发 ============
const chairGroup = new THREE.Group();
const leatherMat = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.45, metalness: 0.05 });

// 座垫
const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.7), leatherMat);
seat.position.y = 0.4;
seat.castShadow = true; seat.receiveShadow = true;
chairGroup.add(seat);

// 靠背
const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.55, 0.12), leatherMat);
back.position.set(0, 0.6, -0.29);
back.castShadow = true;
chairGroup.add(back);

// 左扶手
const armL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.7), leatherMat);
armL.position.set(-0.3, 0.45, 0);
armL.castShadow = true;
chairGroup.add(armL);

// 右扶手
const armR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.7), leatherMat);
armR.position.set(0.3, 0.45, 0);
armR.castShadow = true;
chairGroup.add(armR);

// 铆钉装饰
const studMat = new THREE.MeshStandardMaterial({ color: 0xb8960c, roughness: 0.3, metalness: 0.9 });
for (let i = 0; i < 6; i++) {
  const stud = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), studMat);
  stud.position.set(-0.28 + i * 0.11, 0.52 + (i % 2) * 0.08, -0.28);
  chairGroup.add(stud);
}

chairGroup.position.set(2.2, 0, 1.0);
chairGroup.rotation.y = -0.3;
scene.add(chairGroup);

// ============ 脚凳 ============
const ottoman = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.25, 0.45), leatherMat);
ottoman.position.set(2.75, 0.125, 1.25);
ottoman.rotation.y = 0.4;
ottoman.castShadow = true; ottoman.receiveShadow = true;
scene.add(ottoman);

// ============ 小边几 ============
const sideTable = new THREE.Group();
const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.03, 24), new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.3, metalness: 0.15 }));
tableTop.position.y = 0.52;
tableTop.castShadow = true; tableTop.receiveShadow = true;
sideTable.add(tableTop);

const tableLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.035, 0.5, 12), new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.2, metalness: 0.6 }));
tableLeg.position.y = 0.25;
tableLeg.castShadow = true;
sideTable.add(tableLeg);

// 边几上的酒杯
const sideGlass = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.02, 0.1, 12), new THREE.MeshPhysicalMaterial({ color: 0xffcc88, roughness: 0, metalness: 0, transparent: true, opacity: 0.35 }));
sideGlass.position.y = 0.6;
sideTable.add(sideGlass);

sideTable.position.set(1.7, 0, 1.3);
scene.add(sideTable);

// ============ 书架 ============
const bookShelf = new THREE.Group();
const shelfWood = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.4, metalness: 0.1 });
const bookColors = [0x5c1a1a, 0x1a3a1a, 0x332244, 0x8B6914, 0x2a2a3a, 0x4a2a1a, 0x1a2a3a, 0x5a3a1a];

for (let row = 0; row < 4; row++) {
  const sh = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 0.18), shelfWood);
  sh.position.set(0, 0.2 + row * 0.35, 0);
  sh.castShadow = true; sh.receiveShadow = true;
  bookShelf.add(sh);

  // 书本
  for (let b = 0; b < 5; b++) {
    const book = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.25 + Math.random() * 0.08, 0.14), new THREE.MeshStandardMaterial({ color: bookColors[(row+b)%8], roughness: 0.7 }));
    book.position.set(-0.12 + b * 0.06, 0.35 + row * 0.35, 0);
    book.castShadow = true;
    bookShelf.add(book);
  }
}
bookShelf.position.set(W - 0.08, 0, 1.15);
bookShelf.rotation.y = -Math.PI / 2;
scene.add(bookShelf);

// ============ 装饰画 ============
const painting = new THREE.Mesh(
  new THREE.PlaneGeometry(0.6, 0.8),
  new THREE.MeshStandardMaterial({ color: 0x5c3a1a, roughness: 0.6 })
);
painting.position.set(2.6, 1.7, D - 0.02);
painting.receiveShadow = true;
scene.add(painting);

const frame = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.88, 0.02), new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.2, metalness: 0.8 }));
frame.position.copy(painting.position);
frame.position.z -= 0.01;
scene.add(frame);

// ============ 天花板木梁 ============
for (let i = 0; i < 5; i++) {
  const beam = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, D), new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.5, metalness: 0.05 }));
  beam.position.set(0.3 + i * 0.8, H - 0.04, D/2);
  beam.castShadow = true;
  scene.add(beam);
}

// ============ 踢脚线 ============
const baseboard = new THREE.Mesh(new THREE.BoxGeometry(W, 0.08, 0.02), new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.4 }));
baseboard.position.set(W/2, 0.04, D - 0.01);
scene.add(baseboard);

// ============ 黄铜开关面板 ============
const switchPlate = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.01), new THREE.MeshStandardMaterial({ color: 0xb8960c, roughness: 0.2, metalness: 0.9 }));
switchPlate.position.set(0.3, 1.3, D - 0.01);
scene.add(switchPlate);

// ============ 粒子 — 琥珀浮尘 ============
const particles = new THREE.BufferGeometry();
const count = 80;
const positions = new Float32Array(count * 3);
for (let i = 0; i < count; i++) {
  positions[i*3] = Math.random() * W;
  positions[i*3+1] = Math.random() * H;
  positions[i*3+2] = Math.random() * D;
}
particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffcc88, size: 0.008, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particles, particleMat);
scene.add(particleSystem);

// ============ 渲染循环 ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  particleSystem.rotation.y += 0.0001;
  renderer.render(scene, camera);
}
animate();

// 响应 resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

console.log('🥃 威士忌洞穴已就绪 · 3.62m × 1.82m');
console.log('   拖拽旋转 | 滚轮缩放 | 右键平移');
</script>
</body>
</html>
